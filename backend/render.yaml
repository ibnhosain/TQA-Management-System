services:
  - type: web
    name: tqa-backend
    env: python
    region: singapore          # বাংলাদেশের কাছাকাছি
    plan: free
    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn tqa_backend.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true    # Render নিজেই random key তৈরি করবে
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"          # যেকোনো frontend থেকে API call করতে পারবে
      - key: CRON_SECRET
        generateValue: true    # cron-job.org এর জন্য secret key
      - key: DATABASE_URL
        fromDatabase:
          name: tqa-db
          property: connectionString

databases:
  - name: tqa-db
    databaseName: tqa_ms
    user: tqa_user
    plan: free
    region: singapore
